name: build-publish-deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv sync --group dev
      - run: uv run pytest
      - run: uv run ruff check src tests tasks.py
      - run: uv run ruff format --check src tests tasks.py
      - run: uv run mypy src tests tasks.py

  build-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: name=coilysiren-eco-spec-tracker make .build-docker
      - run: docker tag coilysiren-eco-spec-tracker:latest ghcr.io/${{ github.repository }}/coilysiren-eco-spec-tracker:${{ github.sha }}
      - run: docker push ghcr.io/${{ github.repository }}/coilysiren-eco-spec-tracker:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - uses: actions/checkout@v4
      # Tailscale SSH into kai-server and apply the rendered manifest there.
      # We used to run kubectl straight from the runner against a cluster
      # endpoint exposed over the tailnet, but the k3s API only binds to
      # localhost on kai-server, so the remote kubectl path always timed
      # out. SSH-piping the manifest and letting kai-server's own kubectl
      # do the apply matches the manual deploy flow that's been working
      # all along.
      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns --accept-routes
          hostname: github-actions-${{ github.run_id }}
      - run: make .deploy-ssh
