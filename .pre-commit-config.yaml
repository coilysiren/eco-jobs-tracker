repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi>=0.115.0
          - httpx>=0.28.0
          - jinja2>=3.1.0

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format (C#)
        description: Format C# files in mod/ via the dotnet SDK.
        entry: dotnet format mod/eco-jobs-tracker.sln --include
        language: system
        files: ^mod/.*\.cs$
        require_serial: true
