repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi>=0.115.0
          - httpx>=0.28.0
          - jinja2>=3.1.0

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format (C#)
        description: Apply whitespace, style, and analyzer fixes to changed C# files.
        entry: dotnet format mod/eco-jobs-tracker.sln --include
        language: system
        files: ^mod/.*\.cs$
        require_serial: true

      - id: dotnet-format-verify
        name: dotnet format --verify-no-changes (C#)
        description: Fail if any C# file would still change after formatting (belt-and-suspenders for the auto-fix hook).
        entry: dotnet format mod/eco-jobs-tracker.sln --verify-no-changes --no-restore
        language: system
        files: ^mod/.*\.cs$
        pass_filenames: false
        require_serial: true

      - id: dotnet-build
        name: dotnet build (C#)
        description: Compile the mod solution so broken C# can't be committed.
        entry: dotnet build mod/eco-jobs-tracker.sln -c Debug --nologo -v quiet
        language: system
        files: ^mod/.*\.(cs|csproj|sln)$
        pass_filenames: false
        require_serial: true

      - id: trufflehog
        name: trufflehog (secret scan, offline)
        description: Detect secrets in staged changes via local trufflehog binary (no API verification).
        entry: trufflehog git file://. --since-commit HEAD --no-verification --no-update --fail --exclude-paths=.trufflehog-exclude
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: coily-trailer
        name: coily audit-log trailer
        description: Append Audit-log trailers to the commit message based on coily's audit log for this repo.
        entry: coily git trailer-hook
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        require_serial: true
  
  # BEGIN managed by agentic-os-kai/scripts/apply-commit-msg-hook.py
  - repo: local
    hooks:
      - id: closes-issue
        name: commit closes a GitHub issue
        description: Reject commit messages without a GitHub closing keyword (closes/fixes/resolves #N).
        entry: python3 scripts/check-commit-closes-issue.py
        language: system
        stages: [commit-msg]
  # END managed by agentic-os-kai/scripts/apply-commit-msg-hook.py
  
  
  
  # BEGIN managed by agentic-os-kai/scripts/apply-catalog-block-hook.py
  - repo: local
    hooks:
      - id: catalog-block-present
        name: .coily/coily.yaml catalog block present
        description: Assert this repo declares its catalog metadata. See coilysiren/agentic-os-kai#420.
        entry: python scripts/check-catalog-block.py
        language: python
        additional_dependencies: [pyyaml]
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
  # END managed by agentic-os-kai/scripts/apply-catalog-block-hook.py
