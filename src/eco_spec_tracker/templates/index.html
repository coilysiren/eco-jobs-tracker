{% extends "base.html" %}
{% block title %}Professions — eco-jobs-tracker{% endblock %}
{% block content %}
  <section class="mb-4 flex items-center justify-between">
    <p class="text-sm text-slate-300">
      <strong class="text-slate-100">{{ total_players }}</strong> players tracked
    </p>
    <button
      class="rounded border border-slate-700 bg-slate-800 px-3 py-1.5 text-sm text-slate-100 hover:border-accent"
      hx-get="/partials/professions"
      hx-target="#professions"
      hx-swap="innerHTML"
    >Refresh</button>
  </section>

  <div id="professions">
    {% include "_professions.html" %}
  </div>
{% endblock %}
